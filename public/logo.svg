    <path d="M72 16 L88 18 L84 34 Z" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>

    <path d="M80 30 L82 25 L87 27 L85 32 L87 37 L82 35 L80 30Z" fill="#FFFFFF" fill-opacity="0.9"/>

    <circle cx="28" cy="72" r="6" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="72" cy="28" r="6" fill="#1E3A8A" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="50" cy="50" r="5" fill="#FFFFFF" />
    <circle cx="50" cy="50" r="2.5" fill="#1E3A8A" />

    <path d="M34 66 L45 55 M55 45 L66 34" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <text x="50" y="110" font-family="sans-serif" font-weight="800" text-anchor="middle" dominant-baseline="central">
