    <path d="M40 30 C34.4772 30 30 34.4772 30 40 V60 C30 65.5228 34.4772 70 40 70 H60 C65.5228 70 70 65.5228 70 60 V40 C70 34.4772 65.5228 30 60 30 H40Z" fill="#1E3A8A" />

